databases:
  - name: healthcare-db
    databaseName: healthcare
    user: healthcare_user
    plan: free
    region: oregon

services:
  # ------------------------------------------------------------------
  # Backend API (Express/Sequelize)
  # ------------------------------------------------------------------
  - type: web
    name: healthcare-cms-backend
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

      # Auto-linked to the Postgres instance above — no manual entry needed
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString

      # Cross-service URLs — hardcoded to each service's public onrender.com
      # URL (fromService/host only exposes Render's private-network hostname,
      # which browsers can't reach). If Render assigns a different URL than
      # expected (e.g. a name collision suffix), update these to match and
      # redeploy.
      - key: CLIENT_URL
        value: https://lebeza-frontend.onrender.com
      - key: ADMIN_URL
        value: https://lebeza-admin.onrender.com
      - key: API_BASE_URL
        value: https://healthcare-cms-backend.onrender.com/api

      # Everything below is a secret — Render will prompt you to fill
      # these in the dashboard the first time you deploy (sync: false
      # means "don't store this in the repo").
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CONTACT_EMAIL_TO
        sync: false
      - key: RECEPTION_EMAIL
        sync: false
      - key: RECEPTION_PASSWORD
        sync: false
      - key: RECEPTION_FULL_NAME
        sync: false
      - key: CONTENT_EDITOR_EMAIL
        sync: false
      - key: CONTENT_EDITOR_PASSWORD
        sync: false
      - key: CONTENT_EDITOR_FULL_NAME
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ------------------------------------------------------------------
  # Admin panel (Vite/React static site)
  # ------------------------------------------------------------------
  - type: web
    name: lebeza-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the JS bundle at build time — must be the real public
      # URL (with scheme and /api path), not an internal hostname.
      - key: VITE_API_BASE_URL
        value: https://healthcare-cms-backend.onrender.com/api
      - key: VITE_SITE_URL
        value: https://lebeza-frontend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ------------------------------------------------------------------
  # Public site (Vite/React static site)
  # ------------------------------------------------------------------
  - type: web
    name: lebeza-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://healthcare-cms-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html